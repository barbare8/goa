<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats Preview Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:hsl(233, 47%, 7%);
    font-family:Arial, Helvetica, sans-serif;
    padding:20px;
}

.card{
    max-width:1100px;
    width:100%;
    display:flex;
    background:hsl(244, 38%, 16%);
    border-radius:10px;
    overflow:hidden;
}

.content{
    flex:1;
    padding:70px;
}

.content h1{
    color:white;
    font-size:2.2rem;
    line-height:1.3;
    margin-bottom:25px;
}

.content h1 span{
    color:hsl(277, 64%, 61%);
}

.content p{
    color:hsla(0, 0%, 100%, 0.75);
    line-height:1.8;
    margin-bottom:60px;
}

.stats{
    display:flex;
    gap:60px;
}

.stats h2{
    color:white;
    margin-bottom:8px;
}

.stats span{
    color:hsla(0, 0%, 100%, 0.6);
    font-size:0.8rem;
    letter-spacing:1px;
}

.image{
    flex:1;
    min-height:450px;
    background:
    linear-gradient(
        rgba(170,92,219,0.6),
        rgba(170,92,219,0.6)
    ),
    url("https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1200");
    background-size:cover;
    background-position:center;
}

@media(max-width:768px){

    .card{
        flex-direction:column-reverse;
        text-align:center;
    }

    .content{
        padding:40px 30px;
    }

    .stats{
        flex-direction:column;
        gap:25px;
    }

   .image{
    flex:1;
    min-height:450px;

    background:
        linear-gradient(
            rgba(170,92,219,0.6),
            rgba(170,92,219,0.6)
        ),
        url("https://raw.githubusercontent.com/frontendmentor/stats-preview-card-component/main/design/desktop-preview.jpg");

    background-size: cover;
    background-position: center;
}
}
</style>
</head>

<body>

<main class="card">

    <div class="content">
        <h1>
            Get <span>insights</span> that help your business grow.
        </h1>

        <p>
            Discover the benefits of data analytics and make better
            decisions regarding revenue, customer experience, and
            overall efficiency.
        </p>

        <div class="stats">
            <div>
                <h2>10k+</h2>
                <span>COMPANIES</span>
            </div>

            <div>
                <h2>314</h2>
                <span>TEMPLATES</span>
            </div>

            <div>
                <h2>12M+</h2>
                <span>QUERIES</span>
            </div>
        </div>
    </div>

    <div class="image"></div>

</main>

</body>
</html>
