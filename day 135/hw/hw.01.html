<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easybank</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:white;
}

nav ul{
  display:flex;
  list-style:none;
  gap:20px;
}

button{
  background:green;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:20px;
}

.hero{
  text-align:center;
  padding:80px 20px;
  background:#f4f4f4;
}

.hero h1{
  font-size:40px;
  margin-bottom:20px;
}

.hero p{
  margin-bottom:20px;
}

.features{
  padding:50px;
  text-align:center;
}

.cards{
  display:flex;
  gap:20px;
  justify-content:center;
  margin-top:30px;
}

.card{
  width:200px;
  padding:20px;
  background:#eee;
  border-radius:10px;
}

footer{
  background:#222;
  color:white;
  text-align:center;
  padding:20px;
}
</style>
</head>
<body>

<nav>
  <h2>easybank</h2>

  <ul>
    <li>Home</li>
    <li>About</li>
    <li>Contact</li>
  </ul>

  <button>Request Invite</button>
</nav>

<section class="hero">
  <h1>Next generation digital banking</h1>

  <p>
    Take your financial life online.
  </p>

  <button>Request Invite</button>
</section>

<section class="features">
  <h2>Why choose Easybank?</h2>

  <div class="cards">
    <div class="card">
      <h3>Online Banking</h3>
      <p>Manage your money anywhere.</p>
    </div>

    <div class="card">
      <h3>Budgeting</h3>
      <p>Track your spending easily.</p>
    </div>

    <div class="card">
      <h3>Fast Onboarding</h3>
      <p>Open an account quickly.</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Easybank</p>
</footer>

</body>
</html>
