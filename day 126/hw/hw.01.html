<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Search</title>
</head>
<body>

  <h2>Search Product</h2>

  <form id="searchForm">
    <input type="text" id="searchInput" placeholder="Enter product title or ID" />
    <button type="submit">Search</button>
  </form>

  <div id="result"></div>

  <script>
    const form = document.getElementById("searchForm");
    const input = document.getElementById("searchInput");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const query = input.value.trim().toLowerCase();
      resultDiv.innerHTML = "Loading...";

      try {
        const response = await fetch("https://api.escuelajs.co/api/v1/products/");
        const products = await response.json();

        let filtered;

        
        if (!isNaN(query)) {
          filtered = products.filter(p => p.id === Number(query));
        } else {
         
          filtered = products.filter(p =>
            p.title.toLowerCase().includes(query)
          );
        }

        if (filtered.length === 0) {
          resultDiv.innerHTML = "<p>No products found</p>";
          return;
        }

        resultDiv.innerHTML = filtered.map(p => `
          <div style="border:1px solid #ccc; margin:10px; padding:10px;">
            <h3>${p.title}</h3>
            <p><strong>ID:</strong> ${p.id}</p>
            <p><strong>Price:</strong> $${p.price}</p>
            <img src="${p.images[0]}" width="150"/>
          </div>
        `).join("");

      } catch (error) {
        resultDiv.innerHTML = "<p>Error loading data</p>";
        console.error(error);
      }
    });
  </script>

</body>
</html>
