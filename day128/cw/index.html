<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Weather Dashboard</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>*{    margin:0;    padding:0;    box-sizing:border-box;    font-family:'Poppins',sans-serif;}body{    min-height:100vh;    display:flex;    justify-content:center;    align-items:center;    background:#2f2f2f;    transition:.4s;}.container{    width:1200px;}/* TOP */.top{    display:flex;    justify-content:space-between;    align-items:center;    margin-bottom:45px;}/* DARK MODE */.modeWrapper{    display:flex;    flex-direction:column;    align-items:center;    gap:8px;}.switch{    width:56px;    height:28px;    background:white;    border-radius:50px;    position:relative;    cursor:pointer;}.circle{    width:22px;    height:22px;    background:black;    border-radius:50%;    position:absolute;    top:3px;    right:3px;    transition:.3s;}.modeText{    color:white;    font-size:14px;    font-weight:600;}/* SEARCH */.searchBox{    width:760px;    height:62px;    background:#434343;    border-radius:18px;    border:2px solid #2aa7ff;    display:flex;    align-items:center;    padding:0 20px;}.searchIcon{    width:28px;    margin-right:15px;    filter:invert(1);}.searchInput{    width:100%;    height:100%;    background:none;    border:none;    outline:none;    color:white;    font-size:17px;}.searchInput::placeholder{    color:#d0d0d0;}/* BUTTON */.locationBtn{    width:210px;    height:58px;    border:none;    border-radius:50px;    background:#63d61f;    color:white;    font-size:18px;    font-weight:600;    cursor:pointer;}/* CARD */.card{    width:100%;    height:520px;    background:#4a4a4a;    border-radius:28px;    padding:55px 70px;    display:flex;    justify-content:space-between;    align-items:center;    box-shadow:0 16px 0 rgba(0,0,0,.35);}/* LEFT */.left{    width:25%;}.temp{    font-size:82px;    color:#dedede;    font-weight:700;    margin-bottom:15px;}.feels{    display:flex;    align-items:center;    gap:18px;    margin-bottom:50px;}.feels span{    color:#d5d5d5;    font-size:18px;}.feels p{    font-size:42px;    font-weight:600;    color:white;}.sun{    display:flex;    align-items:center;    gap:18px;    margin-bottom:28px;}.sun img{    width:36px;    filter:invert(1);}.sunInfo h3{    color:white;    font-size:21px;    margin-bottom:5px;}.sunInfo p{    color:#e1e1e1;    font-size:16px;}/* CENTER */.center{    width:35%;    text-align:center;}.mainIcon{    width:210px;    margin-bottom:18px;}.condition{    font-size:44px;    font-weight:600;    color:#f3f3f3;}/* RIGHT */.right{    width:25%;    display:grid;    grid-template-columns:1fr 1fr;    gap:40px;}.info{    text-align:center;}.info img{    width:58px;    margin-bottom:10px;    filter:invert(1);}.value{    font-size:30px;    font-weight:600;    margin-bottom:6px;    color:white;}.label{    color:#ededed;    font-size:16px;}/* LIGHT MODE */.light{    background:#e8e8e8;}.light .card{    background:#ffffff;}.light .modeText{    color:black;}.light .searchBox{    background:white;}.light .searchInput{    color:black;}.light .searchInput::placeholder{    color:#555;}.light .switch{    background:black;}.light .circle{    transform:translateX(-28px);    background:white;}.light .temp,.light .condition,.light .value,.light .sunInfo h3,.light .feels p{    color:black;}.light .label,.light .sunInfo p,.light .feels span{    color:#555;}.light .searchIcon,.light .sun img,.light .info img{    filter:none;}</style></head><body><div class="container">    <!-- TOP -->    <div class="top">        <div class="modeWrapper">            <div class="switch">                <div class="circle"></div>            </div>            <div class="modeText">                Dark Mode            </div>        </div>        <div class="searchBox">            <img            src="https://cdn-icons-png.flaticon.com/512/622/622669.png"            class="searchIcon"            >            <input            type="text"            placeholder="Search for your preferred city..."            class="searchInput"            >        </div>        <button class="locationBtn">            ⦿ Current Location        </button>    </div>    <!-- CARD -->    <div class="card">        <!-- LEFT -->        <div class="left">            <h1 class="temp">                75°F            </h1>            <div class="feels">                <span>Feels like:</span>                <p class="feelsLike">                    22°C                </p>            </div>            <div class="sun">                <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">                <div class="sunInfo">                    <h3>Sunrise</h3>                    <p class="sunrise">                        06:37 AM                    </p>                </div>            </div>            <div class="sun">                <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">                <div class="sunInfo">                    <h3>Sunset</h3>                    <p class="sunset">                        20:37 PM                    </p>                </div>            </div>        </div>        <!-- CENTER -->        <div class="center">            <img            src="https://cdn.weatherapi.com/weather/128x128/day/113.png"            class="mainIcon"            >            <h2 class="condition">                Sunny            </h2>        </div>        <!-- RIGHT -->        <div class="right">            <div class="info">                <img src="https://cdn-icons-png.flaticon.com/512/4148/4148460.png">                <div class="value humidity">                    41%                </div>                <div class="label">                    Humidity                </div>            </div>            <div class="info">                <img src="https://cdn-icons-png.flaticon.com/512/959/959711.png">                <div class="value wind">                    2km/h                </div>                <div class="label">                    Wind Speed                </div>            </div>            <div class="info">                <img src="https://cdn-icons-png.flaticon.com/512/481/481427.png">                <div class="value pressure">                    997hPa                </div>                <div class="label">                    Pressure                </div>            </div>            <div class="info">                <img src="https://cdn-icons-png.flaticon.com/512/979/979585.png">                <div class="value uv">                    8                </div>                <div class="label">                    UV                </div>            </div>        </div>    </div></div><script>const searchInput = document.querySelector(".searchInput");const temp = document.querySelector(".temp");const feelsLike = document.querySelector(".feelsLike");const condition = document.querySelector(".condition");const humidity = document.querySelector(".humidity");const wind = document.querySelector(".wind");const pressure = document.querySelector(".pressure");const uv = document.querySelector(".uv");const sunrise = document.querySelector(".sunrise");const sunset = document.querySelector(".sunset");const mainIcon = document.querySelector(".mainIcon");const switchBtn = document.querySelector(".switch");// ჩასვი შენი API KEYconst API_KEY = "YOUR_API_KEY";async function getWeather(city){    try{        const response = await fetch(        `http://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${city}&days=1&aqi=yes`        );        const data = await response.json();        temp.textContent =        `${Math.round(data.current.temp_f)}°F`;        feelsLike.textContent =        `${Math.round(data.current.feelslike_c)}°C`;        condition.textContent =        data.current.condition.text;        humidity.textContent =        `${data.current.humidity}%`;        wind.textContent =        `${data.current.wind_kph}km/h`;        pressure.textContent =        `${data.current.pressure_mb}hPa`;        uv.textContent =        data.current.uv;        sunrise.textContent =        data.forecast.forecastday[0].astro.sunrise;        sunset.textContent =        data.forecast.forecastday[0].astro.sunset;        mainIcon.src =        "https:" + data.current.condition.icon;    }    catch(error){        alert("City not found");    }}/* SEARCH */searchInput.addEventListener("keypress",(e)=>{    if(e.key === "Enter"){        getWeather(searchInput.value);    }});/* DARK LIGHT */switchBtn.addEventListener("click",()=>{    document.body.classList.toggle("light");});</script></body></html>
